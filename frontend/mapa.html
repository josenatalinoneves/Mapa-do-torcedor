<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa do Torcedor - Visualização</title>
    <link rel="stylesheet" href="css/mapa.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="map-page">
      <header class="hero" style="position: relative">
        <a
          href="telaInicial.html"
          class="back-btn">
    <i class="fa-solid fa-arrow-left"></i>
  </a>

  <div class="logo">
    <i class="fa-solid fa-map" style="color: #000; font-size: 32px;"></i>
  </div>
  <h1>MAPA AO <span>VIVO</span></h1
        <p>Seu time. Sua torcida. Seu lugar.</p>
      </header>

      <div class="map-canvas-container">
        <div class="map-streets"></div>
        <div class="heatmap-spots"></div>

        <div class="action-overlay">
          <div class="cta-card">
            <div class="card-icon">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#8cff2e"
                stroke-width="2.5"
              >
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
              </svg>
            </div>
            <span class="cta-text">ENCONTRAR LUGARES PRÓXIMOS</span>
          </div>
          <p class="tap-hint">Toque para começar</p>
        </div>
      </div>

      <nav class="bottom-nav">
        <a href="telaInicial.html">
          <i class="fa-solid fa-house"></i>
          <span>Início</span>
        </a>

        <a href="mapa.html" class="active">
          <i class="fa-solid fa-map"></i>
          <span>Mapa</span>
        </a>

        <a href="jogos.html">
          <i class="fa-solid fa-calendar-days"></i>
          <span>Jogos</span>
        </a>

        <a href="favoritos.html">
          <i class="fa-solid fa-star"></i>
          <span>Favoritos</span>
        </a>

        <a href="perfil.html">
          <i class="fa-solid fa-user"></i>
          <span>Perfil</span>
        </a>
      </nav>
    </div>
  </body>
</html>
